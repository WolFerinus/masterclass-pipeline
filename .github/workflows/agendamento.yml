name: Regressivo Automation Practice
on:
  schedule:
    - cron: '0 7 * * 1-5' # Executa de segunda a sexta-feira às 7h
jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o projeto
        uses: actions/checkout@v6

      - name: Cypress Run
        uses: cypress-io/github-action@v7
        with:
            record: true
        env:
            CYPRESS_RECORD_KEY: 712ffef0-30c6-4da2-8e22-ef7f81ef7e6b